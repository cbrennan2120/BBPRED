[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[forms]
  # Enables automatic form detection across the project
  enabled = true

[[redirects]]
  # Essential for single-page applications and Next.js client-side routing
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  # Ensuring the build environment is set to production
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"
